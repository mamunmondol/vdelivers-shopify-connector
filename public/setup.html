<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vDelivers Setup</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <h1>vDelivers Setup</h1>
        <p>Connect your vDelivers account to start syncing orders</p>
      </div>
      <div id="error-msg" class="alert alert-error" hidden></div>
      <div id="success-msg" class="alert alert-success" hidden></div>
      <form id="setup-form">
        <div class="form-group">
          <label for="api-url">vDelivers API URL</label>
          <input id="api-url" type="url" placeholder="https://api.vdelivers.com" required>
        </div>
        <div class="form-group">
          <label for="api-key">vDelivers API Key</label>
          <input id="api-key" type="text" placeholder="Your API key from vDelivers dashboard" required>
          <small style="color:var(--c-muted);margin-top:4px;display:block">
            Find this in your vDelivers dashboard under Settings → API Keys
          </small>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">
          Save &amp; Finish Setup
        </button>
      </form>
    </div>
  </div>
  <script>
    const token = new URLSearchParams(location.search).get('token');
    const errEl = document.getElementById('error-msg');
    const okEl  = document.getElementById('success-msg');
    const form  = document.getElementById('setup-form');

    if (!token) {
      errEl.textContent = 'Invalid setup link. Please reinstall the app from Shopify.';
      errEl.hidden = false;
      form.hidden = true;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.hidden = true;
      const btn = form.querySelector('button[type=submit]');
      btn.disabled = true;
      btn.textContent = 'Saving…';
      try {
        const res = await fetch('/api/shops/setup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            token,
            vdelivers_api_url: document.getElementById('api-url').value.trim(),
            vdelivers_api_key: document.getElementById('api-key').value.trim(),
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Setup failed');
        form.hidden = true;
        okEl.innerHTML = '&#10003; Setup complete! Your Shopify store is now connected to vDelivers.<br>Orders will sync automatically going forward.';
        okEl.hidden = false;
      } catch (err) {
        errEl.textContent = err.message;
        errEl.hidden = false;
        btn.disabled = false;
        btn.textContent = 'Save & Finish Setup';
      }
    });
  </script>
</body>
</html>
